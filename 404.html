<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Innowise Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Graphik:+wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }
    .error-page__code {
      font-size: 8rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 24px;
    }
    .error-page__title {
      font-size: 2rem;
      margin-bottom: 16px;
    }
    .error-page__text {
      color: var(--gray-600);
      margin-bottom: 32px;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-page__code">404</div>
      <h1 class="error-page__title">Page not found</h1>
      <p class="error-page__text">The page you're looking for doesn't exist or has been moved.</p>
      <a href="index.html" class="btn btn--primary">Back to Home</a>
    </div>
  </div>
</body>
</html>
